<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK</title>
    <link rel="icon" href="clock.jpg">
    <link rel="stylesheet" href="clock.css">
    
</head>
<body>
    <header>
        CLOCK
    </header>
    <div class="analog-clock">
        <div class="point"></div>
        <div id="session" class="session">AM</div>
        <div id="day" class="day">SUN</div>
        <div id="brand" class="brand">W<span>ENSA</span>R</div>
        <div class="hour hour-1">1</div>
        <div class="hour hour-2">2</div>
        <div class="hour hour-3">3</div>
        <div class="hour hour-4">4</div>
        <div class="hour hour-5">5</div>
        <div class="hour hour-6">6</div>
        <div class="hour hour-7">7</div>
        <div class="hour hour-8">8</div>
        <div class="hour hour-9">9</div>
        <div class="hour hour-10">10</div>
        <div class="hour hour-11">11</div>
        <div class="hour hour-12">12</div>
        <div id="hour-hand" class="hand hour-hand"></div>
        <div id="minute-hand"class="hand minute-hand"></div>
        <div id="second-hand"class="hand second-hand"></div>
    </div>
    <div class="digital-clock">
        <div id="dhour" class="dhour">00</div>
        <span class="sy">:</span>
        <div id="dmin" class="dmin">00</div>
        <span class="sy">:</span>
        <div id="dsec" lass="dsec">00</div>
        <div id="session1" class="session1">AM</div>
    </div>
    <script src="clock.js"></script>
</body>
</html>
